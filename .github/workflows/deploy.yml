name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TanStack Start app
        run: bun run build

      - name: Prerender routes to static HTML
        run: bun ./scripts/prerender.mjs

      - name: Debug — list artifact contents
        run: |
          echo "== dist/client =="
          ls -la dist/client
          echo "== dist/client/assets =="
          ls -la dist/client/assets || echo "NO ASSETS DIR"
          echo "== total size =="
          du -sh dist/client

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
